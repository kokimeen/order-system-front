<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受発注システム（GitHub版）</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif; text-align: center;">

  <h3 id="msg">1. GitHub Pagesから読み込み中...</h3>

  <script>
    window.onload = function() {
      const msgEl = document.getElementById('msg');
      msgEl.innerText = "2. LIFF通信スタート...";

      // あなたのLIFF IDを指定して初期化
      liff.init({ liffId: "2009443949-Am11BkGY" })
        .then(() => {
          msgEl.innerText = "3. LIFF初期化成功！";
          
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          // プロフィール（LINE ID）の取得
          liff.getProfile().then(profile => {
            msgEl.innerHTML = "<h2 style='color:green;'>大成功！🎉</h2><p>GitHub Pages連携完了！</p><p style='color:gray; font-size:0.8em;'>あなたのLINE ID:<br>" + profile.userId + "</p>";
          }).catch(err => {
            msgEl.innerHTML = "<p style='color:red;'>プロフィール取得エラー: " + err + "</p>";
          });

        })
        .catch(err => {
          msgEl.innerHTML = "<p style='color:red;'>LIFF初期化エラー: " + err + "</p>";
        });
    };
  </script>
</body>
</html>
