<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受発注システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
    #loading { text-align: center; color: #666; margin-top: 50px; }
    #content, #error { display: none; }
    .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .success { color: #28a745; text-align: center; }
    .danger { color: #dc3545; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="loading">
    <h3>読み込み中...⏳</h3>
  </div>

  <div id="content">
    <h2 class="success">認証成功！🎉</h2>
    
    <div class="card">
      <h3 id="user-name" style="margin-top: 0;"></h3>
      <p style="color: #666; font-size: 0.9em;">権限: <span id="user-role"></span></p>
    </div>

    <div class="card">
      <h3 style="margin-top: 0; border-bottom: 2px solid #0066cc; padding-bottom: 5px;">🛒 新規発注</h3>
      <form id="order-form">
        <div class="form-group">
          <label>商品を選択</label>
          <select id="product-select"></select>
        </div>
        
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="quantity" min="1" value="1">
        </div>
        
        <button type="button" onclick="testOrder()">発注内容を確認する</button>
      </form>
    </div>
  </div>

  <div id="error">
    <h2 class="danger">アクセスエラー 🚫</h2>
    <div class="card">
      <p>閲覧権限がありません。</p>
      <p style="color: #666; font-size: 0.8em;">LINE ID: <span id="error-id"></span></p>
    </div>
  </div>

  <script>
    // 🚨 【重要】先ほどコピーしたGASの「ウェブアプリのURL」をここに貼ります 🚨
    const GAS_API_URL = "ここにGASのURLを貼り付けてください";
    
    const LIFF_ID = "2009443949-Am11BkGY";
    let currentUser = null; // ユーザー情報を保存しておく変数

    window.onload = function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) { liff.login(); return; }
          liff.getProfile().then(profile => {
            document.getElementById('error-id').innerText = profile.userId;
            checkAuthorization(profile.userId);
          }).catch(err => alert("プロフィール取得エラー: " + err));
        })
        .catch(err => alert("LIFF初期化エラー: " + err));
    };

    function checkAuthorization(userId) {
      const url = GAS_API_URL + "?userId=" + userId;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          document.getElementById('loading').style.display = 'none';

          if (data.isAuthorized) {
            document.getElementById('content').style.display = 'block';
            document.getElementById('user-name').innerText = data.name + " 様";
            document.getElementById('user-role').innerText = data.role;
            
            // IDなどのユーザー情報を記憶しておく（次のステップで送信に使うため）
            currentUser = { id: userId, name: data.name, role: data.role };

            // 💡 スプレッドシートの商品リストをプルダウンにセットする処理
            const select = document.getElementById('product-select');
            data.products.forEach(product => {
              const option = document.createElement('option');
              option.value = product.id; // 裏側で扱うデータ（商品ID）
              option.text = product.name + " (" + product.price + "円 / " + product.unit + ")"; // 画面に表示する文字
              select.appendChild(option);
            });

          } else {
            document.getElementById('error').style.display = 'block';
          }
        })
        .catch(error => {
          alert("通信に失敗しました。\n" + error);
        });
    }

    // 「発注内容を確認する」ボタンを押したときのテスト処理
    function testOrder() {
      const select = document.getElementById('product-select');
      const quantity = document.getElementById('quantity').value;
      const selectedText = select.options[select.selectedIndex].text; // 選んだ商品のテキスト
      
      alert(currentUser.name + " 様\n\n以下の内容で発注しますか？\n\n商品: " + selectedText + "\n数量: " + quantity + "\n\n※今回は確認テストです。まだスプレッドシートには送信されません。");
    }
  </script>
</body>
</html>
